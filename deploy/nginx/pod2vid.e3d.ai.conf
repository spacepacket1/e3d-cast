server {
    listen 80;
    listen [::]:80;
    server_name pod2vid.e3d.ai;

    client_max_body_size 500m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pod2vid.e3d.ai;

    client_max_body_size 500m;

    ssl_certificate /etc/letsencrypt/live/pod2vid.e3d.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pod2vid.e3d.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 1200s;
    proxy_send_timeout 1200s;

    location /api/pod2vid/ {
        proxy_pass http://127.0.0.1:3000;
    }

    location /api/payments/ {
        proxy_pass http://127.0.0.1:3000;
    }

    location /openapi/ {
        proxy_pass http://127.0.0.1:3000;
    }

    location /llms.txt {
        proxy_pass http://127.0.0.1:3000;
    }

    location /.well-known/agent-capabilities.json {
        proxy_pass http://127.0.0.1:3000;
    }

    location / {
        proxy_pass http://127.0.0.1:3200;
    }
}
